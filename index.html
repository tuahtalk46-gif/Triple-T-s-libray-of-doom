<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">BookFinder</p>
        <h1>Search books, save your reading list, and sync with Firestore.</h1>
        <p class="hero-copy">Scan the book archive, secure your reading list, and keep everything synced in real time using Firebase Firestore.</p>
      </div>
    </header>

    <section class="panel search-panel">
      <div class="panel-header">
        <div>
          <p class="panel-label">Search books</p>
          <h2>OpenLibrary results</h2>
        </div>
      </div>

      <form id="search-form" class="search-form">
        <label for="search-input" class="sr-only">Search books</label>
        <div class="search-field">
          <input id="search-input" type="search" placeholder="Search title, author, or subject" autocomplete="off" required />
          <button type="submit">Search</button>
        </div>
      </form>

      <p id="search-status" class="status-line">Search for books using OpenLibrary.</p>
      <div id="search-results" class="cards-grid"></div>
    </section>

    <section class="panel reading-panel">
      <div class="panel-header panel-header--spaced">
        <div>
          <p class="panel-label">Reading list</p>
          <h2>Saved books</h2>
        </div>
        <div class="list-filters" role="group" aria-label="Filter reading list">
          <button type="button" class="filter-btn active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="want">Want</button>
          <button type="button" class="filter-btn" data-filter="read">Read</button>
        </div>
      </div>

      <div id="reading-list" class="reading-list"></div>
    </section>
  </main>

  <button id="freddy-honk-button" class="freddy-honk" type="button" aria-label="Press Freddy's nose to honk">
    <span class="nose-dot"></span>
  </button>
  <audio id="freddy-honk-audio" src="https://quicksounds.com/uploads/tracks/2059485122_2027762566_452740624.mp3" preload="auto"></audio>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js';
    import { getAnalytics } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-analytics.js';
    import {
      getFirestore,
      collection,
      doc,
      onSnapshot,
      setDoc,
      updateDoc,
      deleteDoc
    } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js';

    const USER_ID = 'default-user';
    const FIREBASE_CONFIG = {
      apiKey: 'AIzaSyCsfEoP5RPNsxSOQzWrWt1lkC8kqDyrXpo',
      authDomain: 'triple-t-s-bookfinder.firebaseapp.com',
      projectId: 'triple-t-s-bookfinder',
      storageBucket: 'triple-t-s-bookfinder.firebasestorage.app',
      messagingSenderId: '1097206293837',
      appId: '1:1097206293837:web:f0d2289e7e0216d0dc4304',
      measurementId: 'G-WJ4NE313KN'
    };

    const app = initializeApp(FIREBASE_CONFIG);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);
    const listColRef = collection(db, 'users', USER_ID, 'reading-list');

    const searchForm = document.getElementById('search-form');
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    const searchStatus = document.getElementById('search-status');
    const readingList = document.getElementById('reading-list');
    const filterButtons = Array.from(document.querySelectorAll('.filter-btn'));

    let savedBooks = {};
    let activeFilter = 'all';

    function escHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function encodeBookKey(key) {
      return String(key).replace(/\//g, '_');
    }

    function getCoverUrl(coverId) {
      return coverId ? `https://covers.openlibrary.org/b/id/${coverId}-M.jpg` : '';
    }

    function updateFilterButtons() {
      filterButtons.forEach(button => {
        button.classList.toggle('active', button.dataset.filter === activeFilter);
      });
    }

    function renderSearchResults(books) {
      if (!books.length) {
        searchResults.innerHTML = '<p class="empty-state">No results found. Try a different search term.</p>';
        return;
      }

      searchResults.innerHTML = books
        .map((book, index) => {
          const title = escHtml(book.title || 'Untitled');
          const author = escHtml((book.author_name && book.author_name[0]) || 'Unknown author');
          const year = escHtml(book.first_publish_year || 'Unknown year');
          const key = book.key || '';
          const id = encodeBookKey(key);
          const coverUrl = getCoverUrl(book.cover_i);
          const alreadySaved = !!savedBooks[id];

          return `
            <article class="card" style="animation-delay:${index * 50}ms">
              <div class="card-cover">
                ${coverUrl ? `<img src="${coverUrl}" alt="Cover of ${title}" loading="lazy">` : `<span class="cover-fallback">No cover</span>`}
              </div>
              <div class="card-body">
                <h3>${title}</h3>
                <p>${author}</p>
                <p class="meta">${year}</p>
                <button type="button" class="primary-btn" data-action="save" data-id="${escHtml(id)}" data-book-key="${escHtml(key)}" data-title="${title}" data-author="${author}" data-year="${year}" data-cover-id="${escHtml(book.cover_i || '')}" ${alreadySaved ? 'disabled' : ''}>
                  ${alreadySaved ? 'Saved' : 'Save'}
                </button>
              </div>
            </article>
          `;
        })
        .join('');
    }

    function renderReadingList() {
      const books = Object.values(savedBooks)
        .filter(book => activeFilter === 'all' || book.status === activeFilter)
        .sort((a, b) => b.savedAt - a.savedAt);

      if (!books.length) {
        readingList.innerHTML = '<p class="empty-state">No saved books yet. Search OpenLibrary to add books to your list.</p>';
        return;
      }

      readingList.innerHTML = books
        .map((book, index) => {
          const title = escHtml(book.title || 'Untitled');
          const author = escHtml(book.author || 'Unknown author');
          const year = escHtml(book.year || 'Unknown year');
          const coverUrl = getCoverUrl(book.cover);
          const status = escHtml(book.status || 'want');

          return `
            <article class="reading-item" style="animation-delay:${index * 50}ms">
              <div class="reading-cover">
                ${coverUrl ? `<img src="${coverUrl}" alt="Cover of ${title}" loading="lazy">` : `<span class="cover-fallback">No cover</span>`}
              </div>
              <div class="reading-body">
                <div>
                  <h3>${title}</h3>
                  <p>${author}</p>
                  <p class="meta">${year}</p>
                </div>
                <div class="reading-actions">
                  <button type="button" class="status-btn ${status === 'want' ? 'active' : ''}" data-action="toggle" data-status="want" data-id="${escHtml(book.id)}">Want</button>
                  <button type="button" class="status-btn ${status === 'read' ? 'active' : ''}" data-action="toggle" data-status="read" data-id="${escHtml(book.id)}">Read</button>
                  <button type="button" class="secondary-btn" data-action="remove" data-id="${escHtml(book.id)}">Remove</button>
                </div>
              </div>
            </article>
          `;
        })
        .join('');
    }

    async function fetchBooks(query) {
      const response = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=12`);
      if (!response.ok) {
        throw new Error('Failed to fetch search results');
      }
      const data = await response.json();
      return Array.isArray(data.docs) ? data.docs : [];
    }

    async function saveBook(book) {
      const key = book.key || '';
      const id = encodeBookKey(key);
      const payload = {
        key,
        title: book.title || 'Untitled',
        author: (book.author_name && book.author_name[0]) || 'Unknown author',
        year: book.first_publish_year || '',
        cover: book.cover_i ? String(book.cover_i) : '',
        status: 'want',
        savedAt: Date.now()
      };

      await setDoc(doc(listColRef, id), payload);
    }

    async function deleteBook(id) {
      await deleteDoc(doc(listColRef, id));
    }

    async function updateBookStatus(id, status) {
      const current = savedBooks[id];
      if (!current || current.status === status) {
        return;
      }
      await updateDoc(doc(listColRef, id), { status });
    }

    searchForm.addEventListener('submit', async event => {
      event.preventDefault();
      const query = searchInput.value.trim();
      if (!query) {
        searchStatus.textContent = 'Please enter a search term.';
        return;
      }

      searchStatus.textContent = 'Searching OpenLibrary...';
      searchResults.innerHTML = '';

      try {
        const books = await fetchBooks(query);
        renderSearchResults(books);
        searchStatus.textContent = books.length ? `Showing ${books.length} results.` : 'No books found for that search.';
      } catch (error) {
        searchStatus.textContent = 'Unable to fetch results. Check your network and try again.';
        console.error(error);
      }
    });

    searchResults.addEventListener('click', event => {
      const button = event.target.closest('button[data-action="save"]');
      if (!button) return;

      const book = {
        key: button.dataset.bookKey || '',
        title: button.dataset.title || '',
        author_name: [button.dataset.author || ''],
        first_publish_year: button.dataset.year || '',
        cover_i: button.dataset.coverId || ''
      };

      saveBook(book).catch(error => {
        console.error(error);
        searchStatus.textContent = 'Unable to save book. Try again.';
      });
    });

    readingList.addEventListener('click', event => {
      const button = event.target.closest('button');
      if (!button) return;
      const action = button.dataset.action;
      const id = button.dataset.id;
      if (!id || !action) return;

      if (action === 'remove') {
        deleteBook(id).catch(error => {
          console.error(error);
          searchStatus.textContent = 'Unable to remove book. Try again.';
        });
      }

      if (action === 'toggle') {
        const status = button.dataset.status;
        updateBookStatus(id, status).catch(error => {
          console.error(error);
          searchStatus.textContent = 'Unable to update status. Try again.';
        });
      }
    });

    const freddyButton = document.getElementById('freddy-honk-button');
    const freddyAudio = document.getElementById('freddy-honk-audio');

    freddyButton.addEventListener('click', () => {
      freddyAudio.currentTime = 0;
      freddyAudio.play().catch(() => {
        // fallback if user gesture is required or audio fails
      });
      freddyButton.classList.add('freddy-honk--active');
      setTimeout(() => freddyButton.classList.remove('freddy-honk--active'), 180);
    });

    filterButtons.forEach(button => {
      button.addEventListener('click', () => {
        activeFilter = button.dataset.filter;
        updateFilterButtons();
        renderReadingList();
      });
    });

    onSnapshot(listColRef, snapshot => {
      savedBooks = {};
      snapshot.docs.forEach(docSnapshot => {
        savedBooks[docSnapshot.id] = { id: docSnapshot.id, ...docSnapshot.data() };
      });
      renderReadingList();
    }, error => {
      console.error('Firestore snapshot error:', error);
      searchStatus.textContent = 'Unable to sync reading list. Check your Firebase config.';
    });
  </script>
</body>
</html>
